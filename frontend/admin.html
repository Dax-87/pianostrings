<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PianoStringDB — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0d0f;--bg2:#13131a;--bg3:#1a1a24;--border:#2a2a38;--border2:#3a3a50;--text:#e8e4dc;--text2:#a09890;--text3:#6a6278;--accent:#c8a96e;--accent2:#e8c98e;--accent-glow:rgba(200,169,110,0.15);--green:#4a9e7a;--red:#c85050;--shadow:0 20px 60px rgba(0,0,0,0.6)}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh}
  .container{max-width:960px;margin:0 auto;padding:40px 20px}
  h1{font-family:'Cormorant Garamond',serif;font-weight:300;color:var(--accent);margin-bottom:24px}
  .login-box{max-width:340px;margin:80px auto;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:32px}
  .login-box h2{font-family:'Cormorant Garamond',serif;font-weight:300;color:var(--accent);margin-bottom:20px;text-align:center}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .field label{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text3)}
  .field input{background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Mono',monospace;font-size:.8rem;padding:10px 13px;outline:none}
  .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
  .btn{background:var(--accent);color:var(--bg);border:none;border-radius:7px;font-family:'DM Mono',monospace;font-size:.7rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;padding:11px 22px;cursor:pointer;transition:all .2s;width:100%}
  .btn:hover{background:var(--accent2);box-shadow:0 6px 20px var(--accent-glow)}
  .btn-sm{padding:7px 14px;width:auto;font-size:.6rem}
  .btn-green{background:var(--green)}
  .btn-red{background:var(--red)}
  .error{color:var(--red);font-size:.7rem;margin-bottom:10px;display:none}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
  .header-user{font-size:.7rem;color:var(--text3)}
  .contrib-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px}
  .contrib-meta{font-size:.65rem;color:var(--text3);margin-bottom:8px}
  .contrib-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--accent)}
  .contrib-sections{margin-top:10px;font-size:.72rem;color:var(--text2)}
  .contrib-sections table{width:100%;border-collapse:collapse;margin-top:6px;font-size:.68rem}
  .contrib-sections th{text-align:left;padding:4px 8px;color:var(--text3);border-bottom:1px solid var(--border);font-weight:400}
  .contrib-sections td{padding:4px 8px;border-bottom:1px solid var(--border)}
  .contrib-actions{display:flex;gap:8px;margin-top:12px}
  .badge{padding:2px 8px;border-radius:4px;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase}
  .badge-pending{background:rgba(200,169,110,.15);color:var(--accent);border:1px solid var(--accent)}
  .badge-approved{background:rgba(74,158,122,.15);color:var(--green);border:1px solid var(--green)}
  .badge-rejected{background:rgba(200,80,80,.15);color:var(--red);border:1px solid var(--red)}
  .hidden{display:none}
  .tabs{display:flex;gap:0;margin-bottom:20px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .tab{background:none;border:none;padding:8px 16px;font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);cursor:pointer;border-right:1px solid var(--border)}
  .tab:last-child{border-right:none}
  .tab.active,.tab:hover{background:var(--accent);color:var(--bg)}
  .loader{text-align:center;padding:40px;color:var(--text3);font-size:.8rem;letter-spacing:.15em;text-transform:uppercase}
  .empty{text-align:center;padding:40px;color:var(--text3);font-size:.7rem}
  .reject-notes{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 12px;font-family:'DM Mono',monospace;font-size:.7rem;color:var(--text);outline:none;width:100%;margin-top:8px;resize:vertical}
  .reject-notes:focus{border-color:var(--accent)}
</style>
</head>
<body>
<div class="container" id="loginPage">
  <div class="login-box">
    <h2>PianoStringDB</h2>
    <div class="error" id="loginError"></div>
    <div class="field"><label>Username</label><input type="text" id="loginUser" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="field"><label>Password</label><input type="password" id="loginPass" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn" onclick="doLogin()">Login</button>
  </div>
</div>

<div class="container hidden" id="adminPage">
  <div class="header">
    <h1>PianoStringDB · Admin</h1>
    <div><span class="header-user" id="userLabel"></span> &nbsp; <button class="btn btn-sm" onclick="doLogout()">Logout</button></div>
  </div>
  <div class="tabs">
    <button class="tab active" data-status="pending" onclick="filterTab(this,'pending')">Pending</button>
    <button class="tab" data-status="approved" onclick="filterTab(this,'approved')">Approved</button>
    <button class="tab" data-status="rejected" onclick="filterTab(this,'rejected')">All</button>
  </div>
  <div id="contribList"><div class="loader">Loading</div></div>
</div>

<script>
const API = window.location.origin + '/pianostrings/backend/public/api';
let token = sessionStorage.getItem('admin_token');
let currentFilter = 'pending';

async function api(path, opts = {}) {
  const h = { 'Content-Type': 'application/json', ...opts.headers };
  if (token) h['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API + path, { ...opts, headers: h });
  if (res.status === 401) { sessionStorage.removeItem('admin_token'); token = null; showLogin(); return null; }
  if (!res.ok) { const e = await res.json().catch(() => ({error:res.statusText})); throw new Error(e.error || res.statusText); }
  return res.json();
}

function showLogin() {
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('adminPage').classList.add('hidden');
}
function showAdmin(user) {
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('adminPage').classList.remove('hidden');
  document.getElementById('userLabel').textContent = user;
  loadContributions();
}

async function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  const err = document.getElementById('loginError');
  err.style.display = 'none';
  try {
    const r = await api('/auth/login', { method:'POST', body: JSON.stringify({username:user, password:pass}) });
    token = r.token;
    sessionStorage.setItem('admin_token', token);
    showAdmin(r.username);
  } catch(e) {
    err.textContent = e.message;
    err.style.display = 'block';
  }
}

async function doLogout() {
  await api('/auth/logout', { method:'POST' });
  sessionStorage.removeItem('admin_token');
  token = null;
  showLogin();
}

async function loadContributions() {
  const list = document.getElementById('contribList');
  list.innerHTML = '<div class="loader">Loading</div>';
  try {
    const data = await api('/admin/contributions?status=' + (currentFilter !== 'all' ? currentFilter : ''));
    if (!data || data.length === 0) {
      list.innerHTML = '<div class="empty">No contributions found</div>';
      return;
    }
    list.innerHTML = data.map(c => renderCard(c)).join('');
  } catch(e) {
    list.innerHTML = '<div class="empty">Error: ' + e.message + '</div>';
  }
}

function renderCard(c) {
  const statusClass = 'badge-' + c.status;
  const badge = '<span class="badge ' + statusClass + '">' + c.status + '</span>';
  const date = new Date(c.created_at).toLocaleDateString();
  let table = '<table><tr><th>#</th><th>From</th><th>To</th><th>Type</th><th>Gauge</th><th>Cu1</th><th>Cu2</th></tr>';
  (c.sections || []).forEach((s,i) => {
    table += '<tr><td>' + (i+1) + '</td><td>' + s.from + '</td><td>' + s.to + '</td><td>' + s.type + '</td><td>' + s.gauge + '</td><td>' + (s.copper1||'—') + '</td><td>' + (s.copper2||'—') + '</td></tr>';
  });
  table += '</table>';

  const actions = c.status === 'pending'
    ? '<div class="contrib-actions"><button class="btn btn-sm btn-green" onclick="approve(' + c.id + ')">Approve</button><button class="btn btn-sm btn-red" onclick="showReject(' + c.id + ')">Reject</button></div>'
    : '<div class="contrib-actions"><button class="btn btn-sm btn-red" onclick="delContrib(' + c.id + ')">Delete</button></div>';

  const contributor = c.contributor ? 'by ' + c.contributor + (c.contributor_email ? ' (' + c.contributor_email + ')' : '') : '';
  const source = c.source_file ? ' · ' + c.source_file : '';

  return '<div class="contrib-card" id="card-' + c.id + '">' +
    '<div class="contrib-meta">' + badge + ' · ' + date + ' · ' + contributor + source + '</div>' +
    '<div class="contrib-title">' + c.brand_name + ' — ' + c.model_name + ' (' + c.model_code + ')</div>' +
    '<div class="contrib-sections">' + table + '</div>' +
    (c.status === 'rejected' && c.admin_notes ? '<div style="margin-top:8px;font-size:.65rem;color:var(--text3)">Notes: ' + c.admin_notes + '</div>' : '') +
    '<div id="rejectBox-' + c.id + '"></div>' +
    actions + '</div>';
}

function showReject(id) {
  const box = document.getElementById('rejectBox-' + id);
  box.innerHTML = '<textarea class="reject-notes" id="rejectNotes-' + id + '" placeholder="Reason for rejection (optional)"></textarea>';
}

async function approve(id) {
  try {
    await api('/admin/contributions/' + id + '/approve', { method:'POST' });
    loadContributions();
  } catch(e) { alert(e.message); }
}

async function reject(id) {
  const notes = document.getElementById('rejectNotes-' + id)?.value || '';
  try {
    await api('/admin/contributions/' + id + '/reject', { method:'POST', body: JSON.stringify({admin_notes: notes}) });
    loadContributions();
  } catch(e) { alert(e.message); }
}

async function delContrib(id) {
  if (!confirm('Delete this contribution?')) return;
  try {
    await api('/admin/contributions/' + id, { method:'DELETE' });
    loadContributions();
  } catch(e) { alert(e.message); }
}

function filterTab(btn, status) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = status;
  loadContributions();
}

// Init
if (token) {
  api('/admin/auth/check').then(r => showAdmin(r.username)).catch(() => showLogin());
} else {
  showLogin();
}
</script>
</body>
</html>
